# /etc/sysctl.d/99-host.conf
# Host-level kernel tuning. Installed by scripts/bootstrap-host.sh.

# Required for Docker bridge / NAT and gw0 forwarding.
net.ipv4.ip_forward = 1

# BBR + fq: better throughput on long-fat links (CN2-GIA backbone).
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Headroom for file-watching containers (NPM, Portainer, dev tools).
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512

# 4 GB RAM is tight: prefer keeping working set in RAM, swap reluctantly.
vm.swappiness = 10

# TCP Fast Open for both incoming and outgoing connections.
net.ipv4.tcp_fastopen = 3

# Hide kernel pointers / ring buffer from non-root users.
kernel.dmesg_restrict = 1

# --- gw0 UDP-tunnel gateway perf tuning -----------------------------------
# Stock Linux UDP socket buffers are sized for low-bandwidth desktop use.
# An AmneziaWG gateway shovels ~50 Mbps+ UDP per peer through a single
# kernel socket; if rmem fills, the kernel silently drops packets *before*
# the awg module ever sees them. Tail loss looks like "VPN feels laggy".
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 2621440
net.core.wmem_default = 2621440

# Per-CPU input queue between the NIC softirq and the protocol stack.
# Default 1000 is fine on a desktop; tunnel gateways burst higher.
net.core.netdev_max_backlog = 5000

# Floor for UDP socket buffers — stops the kernel from auto-shrinking
# below a sane minimum under memory pressure.
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# TCP autotuning bounds for TCP traffic that traverses the tunnel
# (e.g., a peer downloading a Git repo). 16 MiB ceiling matches the
# UDP tuning above.
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Path MTU discovery via probing (RFC 4821). Critical for tunnels:
# the encapsulated TCP path has a smaller effective MSS than the
# physical link, and ICMP needed-frag is often filtered along CN
# routes, so classic PMTUD silently black-holes. tcp_mtu_probing=1
# lets the stack discover the working MSS by probing.
net.ipv4.tcp_mtu_probing = 1

# Hold writes in the socket buffer until at least 16 KiB is queued.
# Reduces small-packet syscall overhead on bulk transfers; harmless
# for interactive flows.
net.ipv4.tcp_notsent_lowat = 16384
