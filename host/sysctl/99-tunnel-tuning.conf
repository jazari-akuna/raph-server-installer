# /etc/sysctl.d/99-tunnel-tuning.conf
#
# Sysctl-only knobs for the gw0 AmneziaWG tunnel. Companion to the
# raph-tunnel-tunables.service unit which handles the runtime knobs
# (qdisc, RPS, ethtool offloads) that have no sysctl interface.
#
# Loaded after 99-host.conf (sysctl.d sorts lexicographically; 99-host
# < 99-tunnel-tuning) so settings here override anything in 99-host.

# --- TCP send-side autotuning -------------------------------------------
# tcp_notsent_lowat caps how many bytes can sit in the socket send queue
# AFTER the packets in flight (i.e., bytes that haven't even been pushed
# down to the IP layer yet). A small value keeps tail latency low for
# interactive workloads — but for bulk TCP-over-WG with BBR over a
# high-BDP path (50ms RTT @ 100 Mbps -> 625 KiB BDP), a 16 KiB notsent
# ceiling literally throttles BBR's pacer: as soon as 16 KiB is queued
# the kernel stops accepting writes from userspace until ACKs free up
# room. Bumping to 128 KiB lets the sender keep ~1 BDP unsent in
# addition to ~1 BDP in flight, which is what BBR actually needs to
# converge on the right rate. Any TCP socket that wants the old behavior
# can opt back in via TCP_NOTSENT_LOWAT setsockopt.
net.ipv4.tcp_notsent_lowat = 131072

# --- RFS sock flow table ------------------------------------------------
# Receive Flow Steering: kernel keeps a hash table mapping (4-tuple) ->
# (CPU running the consuming socket). RPS uses this so each packet is
# steered to the CPU that owns the socket, reducing L1/L2 thrash. The
# per-queue rps_flow_cnt is set by raph-tunnel-tunables.service since
# it has no sysctl interface; this number is the global ceiling.
# 32k = ~256 KiB of memory; cheap on a 4 GiB box.
net.core.rps_sock_flow_entries = 32768
