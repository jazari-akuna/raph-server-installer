# /etc/ssh/sshd_config.d/99-hardening.conf
#
# WARNING: this drop-in disables root login and password auth.
# Install ONLY after both admin keys (sagan, marcus) are confirmed working
# from a separate session. Locking yourself out is the failure mode here.
#
# Verification before installing:
#   ssh sagan@<vps>  -- must succeed with key
#   ssh marcus@<vps> -- must succeed with key
# Then: cp /root/host/ssh/sshd_config.d/99-hardening.conf /etc/ssh/sshd_config.d/
#       sshd -t && systemctl reload ssh

PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
MaxAuthTries 3
X11Forwarding no
AllowUsers sagan marcus
ClientAliveInterval 300
ClientAliveCountMax 2
