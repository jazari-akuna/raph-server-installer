# enrol — server admin UI (users, storage tracking, TOTP, peers).
#
# Camouflage: external hostname is `enrol.${DOMAIN}` (e.g. enrol.example.com).
# Internal container/service name `enrol` is fine.
#
# ${DOMAIN} is read from /opt/stacks/.env, which bootstrap writes at install
# time from the operator-supplied $DOMAIN. Compose substitutes it before
# starting the container.
#
# Auth is delegated to Authelia via NPM forward-auth (ADR-003). enrol trusts
# the Remote-User and Remote-Groups headers and rejects any request missing
# them. CSRF tokens further gate every mutating POST. See DESIGN.md.
#
# === PRIVILEGE WARNING ====================================================
# enrol holds the docker socket (`/var/run/docker.sock:rw`). With it the
# container can spawn privileged sibling containers and pivot to host root
# via `docker run -v /:/host`. Anyone with admin access to enrol is
# effectively root on this host. Mitigations: NPM HTTPS + Authelia 2FA +
# CSRF + audit log. See README.md "Security & Threat Model" and DESIGN.md.
#
# Per-user LUKS was removed (ADR-004). The container no longer needs
# `privileged: true` / `pid: host` / cryptsetup / loop devices / dm-mapper
# — Wave 1C of the Nextcloud migration ripped all of that. The remaining
# attack surface (docker socket) is unchanged but the casual blast radius
# from accidental mount/loop syscalls is gone.
# ==========================================================================
#
# Privilege model:
#   - network_mode: host — `awg syncconf gw0` needs the host's net namespace
#     and is simpler with network_mode: host than via nsenter. The container
#     binds ENROL_LISTEN on 172.17.0.1:8080 (docker bridge gateway); the
#     public WAN interface is NOT bound. Public exposure stays via NPM only.

services:
  enrol:
    build:
      context: .
      dockerfile: Dockerfile
    image: enrol:local
    container_name: enrol
    restart: unless-stopped

    # Share the host's network namespace directly. syncconf runs in the
    # same namespace as gw0, so no nsenter / no /proc/1/ns/net access
    # needed. Mutually exclusive with `networks:` and `ports:`.
    network_mode: host

    # CAP_NET_ADMIN is required by `awg syncconf` to talk to the kernel
    # WireGuard netlink socket — without it, peer-add silently fails to
    # propagate to the live interface (the conf file is still appended,
    # so the UI says success but the peer never actually gets handshaked
    # by the server). This used to be implicitly granted by
    # `privileged: true` (when LUKS was in the picture); removing
    # privileged in 51a6cbe lost it. Re-grant just NET_ADMIN — narrowest
    # capability that still lets the wg netlink calls work.
    cap_add:
      - NET_ADMIN

    volumes:
      # Source of truth for peers: gw0.conf + sidecar metadata + the
      # shared audit log (peers + users lifecycle entries).
      - /etc/amnezia/amneziawg:/etc/amnezia/amneziawg:rw

      # Host-side override files that renderClientConf reads (DNS server,
      # AllowedIPs, peer MTU). configure-host-dns.sh writes
      # /var/cache/raph/dns-servers.txt; without this mount enrol falls
      # back to the public-DNS default and the local resolver
      # optimization is silently skipped.
      - /var/cache/raph:/var/cache/raph:ro

      # /srv/store holds: enrol's setup wizard state (/srv/store/setup),
      # the launcher tile dir (/srv/store/enrol-launcher), the peer
      # archive (/srv/store/enrol-peers-archive), and Nextcloud's per-
      # user data dir (/srv/store/cloud-data, owned by uid 33). enrol
      # reads cloud-data via `du -sb` for the admin storage page (see
      # storage.go). Plain rw bind — no rshared propagation needed
      # since we no longer mount LUKS volumes from inside the container.
      - /srv/store:/srv/store:rw

      # Authelia's source-of-truth directory — we bind the parent dir
      # (not just users_database.yml) so atomic tmpfile+rename writes
      # work. A single-file bind would refuse the rename with EBUSY
      # because the destination path *is* the mount-line itself; the
      # kernel sees a rename "into" a mount point and refuses. Mounting
      # the dir lets us tmpfile+rename inside the dir without crossing
      # any mount boundary. enrol only writes users_database.yml, so
      # the rest of the dir's contents are immaterial. ENROL_USERS_DB
      # points at the file path inside this bind.
      - /opt/stacks/authelia:/etc/authelia:rw

      # Docker socket for `docker exec authelia authelia storage user
      # totp generate <user>` and `docker exec cloud occ user:delete`.
      # This is the most-sensitive bind on this container; together
      # with /opt/stacks below it makes enrol effectively root-equivalent
      # on the host. See DESIGN.md.
      - /var/run/docker.sock:/var/run/docker.sock:rw

      # AmneziaWG userspace tools live on the host (the kernel module
      # understands the Jc/Jmin/H1-H4 params; vanilla wg-quick strip
      # in our base image rejects them). network_mode: host shares
      # the host's net ns but NOT its mount ns, so we bind-mount the
      # host binaries directly. awg-quick is a bash script that re-
      # execs awg from the same dir; mounting both into /usr/bin to
      # override the vanilla wg/wg-quick that the image installs.
      - /usr/bin/awg:/usr/bin/awg:ro
      - /usr/bin/awg-quick:/usr/bin/awg-quick:ro

      # Setup wizard (Parcel 3A). The token file is the out-of-band
      # secret printed at the end of bootstrap; the setup handler
      # reads it once at startup and constant-time-compares against
      # the operator's ?token=. The repo + stacks dirs are needed by
      # the finalize pipeline so it can re-run render-templates.sh
      # and so it can `docker compose run` the certbot one-shot from
      # the ingress stack.
      #
      # Both repo + stacks are bind-mounted RW (not :ro) because
      # render-templates.sh writes the rendered sibling next to each
      # *.template file under /opt/raph-server-installer, and the
      # finalize handler appends operator-supplied secrets to
      # /opt/stacks/.env (NPM admin password etc.). With `:ro` here
      # the wizard's templates step fails with EROFS on the mv into
      # the rendered output. Finalize's OIDC rotation step also writes
      # the plaintext client_secret under /etc/raph-installer/ for the
      # operator to paste into Portainer / Nextcloud user_oidc.
      - /etc/raph-installer:/etc/raph-installer:rw
      - /opt/raph-server-installer:/opt/raph-server-installer:rw
      - /opt/stacks:/opt/stacks:rw

      # DNS-01 credentials hand-off. enrol writes the operator-supplied
      # provider creds to /run/raph-certbot/<provider>.ini at finalize
      # time; certbot is then `docker compose run --rm` from the ingress
      # stack with /run/raph-certbot bind-mounted at /tmp/certbot-creds.
      # Without binding the host's /run/raph-certbot in here, enrol writes
      # to its OWN container tmpfs at /run, the host directory stays
      # empty, and certbot fails with "File not found:
      # /tmp/certbot-creds/<provider>.ini". The host directory is created
      # by bootstrap-phase2.sh before this stack comes up.
      - /run/raph-certbot:/run/raph-certbot:rw

      # In-flight wizard secrets (admin password etc.) cache. On host
      # tmpfs (/run is tmpfs on Ubuntu 24.04 by default), root-only,
      # evaporates on reboot. enrol mirrors setupSecretCache here so a
      # container rebuild doesn't strand the operator with "admin password
      # missing from in-memory cache" mid-finalize. Deleted on successful
      # finalize. Threat model is the same as /run/raph-certbot above.
      - /run/raph-setup-secrets:/run/raph-setup-secrets:rw

    environment:
      # Bind to the docker0 bridge gateway IP, which is what NPM's
      # ingress container sees as `host.docker.internal`. This excludes
      # the public WAN NIC (eth0), so public exposure remains strictly
      # via NPM. 172.17.0.1 is the default Docker bridge gateway and is
      # stable absent custom daemon.json bip changes.
      ENROL_LISTEN: "172.17.0.1:8080"
      ENROL_AWG_DIR: "/etc/amnezia/amneziawg"
      ENROL_AWG_IFACE: "gw0"
      ENROL_DOMAIN: "${DOMAIN:?DOMAIN must be set in /opt/stacks/.env}"
      ENROL_AWG_ENDPOINT: "gw.${DOMAIN}:443"
      ENROL_PEER_SUBNET: "10.99.0.0/24"
      ENROL_PEER_START: "10"
      ENROL_HEADER_USER: "Remote-User"
      ENROL_HEADER_GROUPS: "Remote-Groups"
      ENROL_REQUIRED_GROUP: "admin"
      # Forward-auth secret: NPM injects X-Forward-Auth-Secret on every
      # protected request (see finalizeWireNPM), and enrol's auth gate
      # constant-time-compares against this env var. Without it an
      # attacker who lands on the docker bridge can curl 172.17.0.1:8080
      # directly with forged Remote-User/Remote-Groups headers and
      # become root. Generated by scripts/generate-enrol-forward-auth-secret.sh
      # during bootstrap phase 2 and persisted to /opt/stacks/.env;
      # compose --env-file substitutes the value here at up time.
      ENROL_FORWARD_AUTH_SECRET: "${ENROL_FORWARD_AUTH_SECRET:-}"
      # network_mode: host means the reload command is already in the
      # right namespace; skip the nsenter wrapper.
      ENROL_RELOAD_NSENTER: "false"

      # Authelia integration: the YAML file enrol writes (its own bind
      # mount path), and the docker-exec target for TOTP generation.
      ENROL_USERS_DB: "/etc/authelia/users_db/users_database.yml"
      ENROL_AUTHELIA_CONTAINER: "authelia"

      # Launcher (post-login app tile grid). Lives under /srv/store; the
      # directory is bootstrapped on startup with the default tiles.
      ENROL_LAUNCHER_DIR: "/srv/store/enrol-launcher"

      # Authoritative on-disk archive of rendered peer .conf files.
      # gw0.conf does not retain peer private keys, so without this
      # archive the only way to obtain a peer's working .conf is to
      # catch the creation page before navigating away. Stored 0700
      # root-owned dir; files 0600 root-owned. See peers_archive.go.
      ENROL_PEERS_ARCHIVE_DIR: "/srv/store/enrol-peers-archive"

      # Setup wizard (Parcel 3A). SETUP_TOKEN is read from the bootstrap
      # .env (which we receive verbatim via --env-file at compose-up
      # time); the wizard takes that as the authoritative source and
      # falls back to /etc/raph-installer/setup-token if absent. The
      # *_DIR + *_SENTINEL paths line up with Wave 2A's conventions.
      SETUP_TOKEN: "${SETUP_TOKEN:-}"
      ENROL_SETUP_STATE_DIR: "/srv/store/setup"
      ENROL_SETUP_COMPLETE: "/srv/store/.setup-complete"
      ENROL_SETUP_TOKEN_FILE: "/etc/raph-installer/setup-token"
      ENROL_STACKS_DIR: "/opt/stacks"
      ENROL_REPO_DIR: "/opt/raph-server-installer"

    healthcheck:
      # ENROL_LISTEN binds to 172.17.0.1:8080 (the docker bridge gateway),
      # not 127.0.0.1, so the healthcheck must hit the bridge IP too.
      test: ["CMD", "wget", "--quiet", "--spider", "http://172.17.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
