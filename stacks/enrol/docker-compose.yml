# enrol — server admin UI (users, LUKS storage, TOTP, devices).
#
# Camouflage: external hostname is `enrol.antarctica-engineering.com`.
# Internal container/service name `enrol` is fine.
#
# Auth is delegated entirely to Authelia via NPM forward-auth. enrol
# trusts the Remote-User and Remote-Groups headers and rejects any
# request missing them. CSRF tokens further gate every mutating POST.
# See DESIGN.md.
#
# === PRIVILEGE WARNING ====================================================
# enrol runs PRIVILEGED. It can:
#   - format/wipe LUKS blobs under /srv/store
#   - mount / unmount filesystems on the host
#   - rewrite Authelia's users_database.yml (create/delete users,
#     change passwords, change group membership)
#   - exec into any container via the bind-mounted docker socket
# Anyone with admin access to enrol is effectively root on this host.
# Mitigations: NPM HTTPS + Authelia 2FA + CSRF + audit log. See
# README.md "Security & Threat Model" and DESIGN.md § 3.
# ==========================================================================
#
# Privilege model:
#   - privileged: true — covers loop devices, dm-crypt, mount, shred.
#     We considered a surgical alternative (cap_add SYS_ADMIN/MKNOD/
#     NET_ADMIN + --device=/dev/loop-control + cgroup rule for /dev/loopN
#     + AppArmor=unconfined), but the practical access set is the same
#     and the surgical version is fragile across kernel updates. See
#     DESIGN.md § 0.4.
#   - network_mode: host — kept from prior compose. `awg syncconf gw0`
#     needs to run in the host's net namespace and is simpler with
#     network_mode: host than with nsenter.
#   - The container exposes ENROL_LISTEN on 172.17.0.1:8080. NPM (on the
#     edge bridge) reaches us via that bridge gateway IP. The public WAN
#     interface is NOT bound. We cannot bind 127.0.0.1 because edge-network
#     containers reach the host as 172.17.0.1, not as loopback.

services:
  enrol:
    build:
      context: .
      dockerfile: Dockerfile
    image: enrol:local
    container_name: enrol
    restart: unless-stopped
    mem_limit: 128m

    # Share the host's network namespace directly. syncconf runs in the
    # same namespace as gw0, so no nsenter / no /proc/1/ns/net access
    # needed. Mutually exclusive with `networks:` and `ports:`.
    network_mode: host

    # privileged: true covers the entire LUKS toolchain: loop devices,
    # dm-mapper, mount syscalls, raw block-device shred. cap_add is
    # implied but listed for documentation.
    privileged: true

    volumes:
      # Source of truth for peers: gw0.conf + sidecar metadata + the
      # shared audit log (peers + users + LUKS lifecycle entries).
      - /etc/amnezia/amneziawg:/etc/amnezia/amneziawg:rw

      # LUKS blobs (/srv/store/data/<u>.img) and mountpoints
      # (/srv/store/mnt/<u>). Bind-propagation: rshared lets mounts
      # done inside the container appear on the host (so `cloud` —
      # which mounts /srv/store/mnt:/w with rslave — picks them up),
      # AND lets host-driven mounts come back into the container.
      # See ../enrol/DESIGN.md § 0.3 and stacks/cloud/docker-compose.yml.
      - type: bind
        source: /srv/store
        target: /srv/store
        bind:
          propagation: rshared

      # Authelia's users_database.yml — the source of truth for users
      # + password hashes + group membership. Rendered at /etc/authelia/
      # path inside the container (a different mount point than the
      # /config/users_database.yml the authelia container itself uses,
      # to avoid implying we share that container's mount layout).
      - /opt/stacks/authelia/users_database.yml:/etc/authelia/users_database.yml:rw

      # Docker socket for `docker exec authelia authelia storage user
      # totp generate <user>`. This is the second-most-sensitive bind
      # after /srv/store; together they make this container effectively
      # root-equivalent on the host. See DESIGN.md § 3.
      - /var/run/docker.sock:/var/run/docker.sock:rw

      # AmneziaWG userspace tools live on the host (the kernel module
      # understands the Jc/Jmin/H1-H4 params; vanilla wg-quick strip
      # in our base image rejects them). network_mode: host shares
      # the host's net ns but NOT its mount ns, so we bind-mount the
      # host binaries directly. awg-quick is a bash script that re-
      # execs awg from the same dir; mounting both into /usr/bin to
      # override the vanilla wg/wg-quick that the image installs.
      - /usr/bin/awg:/usr/bin/awg:ro
      - /usr/bin/awg-quick:/usr/bin/awg-quick:ro

    environment:
      # Bind to the docker0 bridge gateway IP, which is what NPM's
      # ingress container sees as `host.docker.internal`. This excludes
      # the public WAN NIC (eth0), so public exposure remains strictly
      # via NPM. 172.17.0.1 is the default Docker bridge gateway and is
      # stable absent custom daemon.json bip changes.
      ENROL_LISTEN: "172.17.0.1:8080"
      ENROL_AWG_DIR: "/etc/amnezia/amneziawg"
      ENROL_AWG_IFACE: "gw0"
      ENROL_AWG_ENDPOINT: "gw.antarctica-engineering.com:51820"
      ENROL_PEER_SUBNET: "10.99.0.0/24"
      ENROL_PEER_START: "10"
      ENROL_HEADER_USER: "Remote-User"
      ENROL_HEADER_GROUPS: "Remote-Groups"
      ENROL_REQUIRED_GROUP: "admins"
      # network_mode: host means the reload command is already in the
      # right namespace; skip the nsenter wrapper.
      ENROL_RELOAD_NSENTER: "false"

      # Authelia integration: the YAML file enrol writes (its own bind
      # mount path), and the docker-exec target for TOTP generation.
      ENROL_USERS_DB: "/etc/authelia/users_database.yml"
      ENROL_AUTHELIA_CONTAINER: "authelia"

      # LUKS storage layout. Match scripts/create-store-volume.sh.
      ENROL_STORE_DATA_DIR: "/srv/store/data"
      ENROL_STORE_MNT_DIR: "/srv/store/mnt"
      ENROL_LUKS_SIZE_GB: "50"

    healthcheck:
      # ENROL_LISTEN binds to 172.17.0.1:8080 (the docker bridge gateway),
      # not 127.0.0.1, so the healthcheck must hit the bridge IP too.
      test: ["CMD", "wget", "--quiet", "--spider", "http://172.17.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
