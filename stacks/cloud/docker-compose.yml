# cloud — file server (internally: copyparty)
#
# Camouflage: service/container/network use the neutral name `cloud`.
# No public port bindings — reachable only via `ingress`
# (`cloud.${DOMAIN}`) over the shared `edge` network.
# copyparty's default port is 3923; we expose nothing to the host.
#
# Identity comes from Authelia via NPM forward-auth. See
# ./conf/copyparty.conf and ../authelia/DESIGN.md.
#
# Volume semantics: /srv/store/mnt/<u> on the host are LUKS unlock
# points (one per user). When the per-user blob is NOT unlocked these
# are empty directories, and copyparty serves an empty volume —
# fail-closed by accident, intentional. See ./README.md.

services:
  cloud:
    # copyparty/ac — "all-codecs" image (bundles ffmpeg etc. for thumbnails
    # and audio transcoding). Pinned to current stable verified 2026-04-25:
    # tag v1.20.14 ("autolocalization"). Bump deliberately; do not use
    # `latest`. Upstream: https://github.com/9001/copyparty
    image: copyparty/ac:1.20.14
    container_name: cloud
    restart: unless-stopped
    mem_limit: 2g

    # No `ports:` — strictly internal. `ingress` reaches us over `edge`
    # at cloud:3923. Adding a public port binding is a misconfiguration.

    # The image's entrypoint reads /cfg/*.conf automatically when /cfg
    # is present (`-c /cfg`-equivalent behavior baked into the upstream
    # entrypoint). We mount our config there read-only and let the
    # default startup pick it up. No `command:` override needed.

    volumes:
      # Per-user data roots, served as a single bind-mount.
      #
      # PRIOR LAYOUT (deprecated): one static per-user bind per user
      #     /srv/store/mnt/<u>:/w/<u>
      # which required editing this file + recreating the container
      # for every new user.
      #
      # NEW LAYOUT: a single bind-mount of the parent /srv/store/mnt
      # at /w. copyparty's IdP rule [/u/${u}] /w/${u} resolves at
      # request time against any /srv/store/mnt/<u>/ subdirectory
      # that exists on the host — so a fresh user added via enrol
      # is visible to copyparty without restarting cloud.
      #
      # `bind-propagation=rslave` is load-bearing: it makes mounts
      # done on the host *after* this container started — e.g. when
      # a LUKS blob is unlocked + mounted onto /srv/store/mnt/<u> —
      # propagate into /w/<u> inside the container. The default
      # `rprivate` propagation does NOT do this; we verified
      # empirically before changing this stack. See
      # ../enrol/DESIGN.md § 0.3 for the propagation gotcha.
      - type: bind
        source: /srv/store/mnt
        target: /w
        bind:
          propagation: rslave
      # Config (read-only). copyparty auto-loads *.conf from /cfg.
      - ./conf:/cfg:ro
      # Persistent state: hash DB, thumbs cache, ah-salt.txt, IdP user
      # cache (idp-store), etc.
      - ./data:/var/lib/copyparty

    environment:
      # Make logs flush promptly so `docker logs` is useful during
      # auth / volume troubleshooting.
      PYTHONUNBUFFERED: "1"
      # Per-user password hashes are no longer used: identity is
      # delegated to Authelia via the IdP headers configured in
      # ./conf/copyparty.conf. Per-user hash env vars are intentionally
      # dropped here.

    # Allow the thumbnailer to drain on shutdown (matches upstream advice).
    stop_grace_period: 15s

    healthcheck:
      # `/?reset=/._` matches the default --lf-url filter so health pings
      # don't spam the access log.
      test: ["CMD-SHELL", "wget --spider -q 127.0.0.1:3923/?reset=/._"]
      interval: 1m
      timeout: 2s
      retries: 5
      start_period: 15s

    networks:
      - edge

networks:
  edge:
    external: true
