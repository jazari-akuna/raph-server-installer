; PHP override for 50 GB streaming uploads.
;
; Loaded by the nextcloud-fpm image's php conf.d/ scanner. The `zz-`
; filename prefix puts this last alphabetically so its values win over
; the image's own defaults and over the env-var-driven template (which
; is loaded earlier).
;
; All four upload-chain layers (this file, conf/nginx.conf,
; npmAdvNextcloudTmpl in stacks/enrol/setup.go, and Nextcloud's
; default_quota set via occ) must agree or uploads fail at whichever
; is most restrictive. See README.md.

upload_max_filesize = 50G
post_max_size = 50G
memory_limit = 512M
max_execution_time = 3600
max_input_time = 3600
output_buffering = Off
