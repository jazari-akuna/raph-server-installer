# copyparty config for `cloud` — IdP / forward-auth mode.
#
# Loaded automatically by the copyparty/ac image because it sits in /cfg.
# Identity (username + groups) is supplied by Authelia via the upstream
# NPM forward-auth path:
#
#     browser → NPM (auth_request → authelia /api/verify) → cloud:3923
#
# On a verified request, NPM injects two headers we trust here:
#     Remote-User    <admin-username>
#     Remote-Groups  comma-separated; "admins" is the privileged group
#
# copyparty's IdP mode (idp-h-usr / idp-h-grp) creates per-user dynamic
# volumes from the ${u} placeholder. We do NOT use idp-h-key (would
# require sharing a secret with NPM); the xff-src constraint plus the
# "no public port" property of this stack keeps the trust boundary at
# the docker network.

[global]
  # Bind only inside the container; no host port is published anyway.
  i: 0.0.0.0
  p: 3923

  # ---------------- IdP / forward-auth -----------------
  # Headers populated by Authelia via NPM. Names must match exactly what
  # the authelia-authrequest.conf snippet sets via `proxy_set_header`.
  idp-h-usr: Remote-User
  idp-h-grp: Remote-Groups

  # Trust XFF (and therefore the IdP headers) only from the docker
  # network where ingress + cloud sit. Docker's default user-defined
  # bridge networks live in 172.16.0.0/12; lock to that. If the deploy
  # ever moves networks to a custom subnet, narrow this further.
  xff-src: 172.16.0.0/12

  # Persist IdP-derived users across restart so volumes don't have to
  # be re-walked on every redeploy. Value 3 = remember users + groups.
  idp-store: 3

  # No anonymous browsing or uploads. The volume blocks below grant
  # permissions only to ${u} (the authenticated user), so an unauthed
  # request — which can't happen because forward-auth runs first —
  # would get nothing anyway. Defence in depth.

# ---- volumes ---------------------------------------------------------
#
# IdP mode: the ${u} placeholder is substituted with the authenticated
# username. copyparty creates a dynamic per-user volume on first hit.
# The host-side bind-mount in docker-compose.yml provides /w/<u> for
# every user whose LUKS volume is unlocked into /srv/store/mnt/<u>.
# An IdP-derived "alice" hits /w/alice; an IdP-derived "bob" with no
# corresponding mounted volume would hit a missing path → empty / 404.
#
# We deliberately DO NOT define a `[/]` root volume — without one,
# unauthenticated visitors get nothing.

[/u/${u}]
  /w/${u}
  accs:
    rwmda: ${u}

# Shared volume — every authenticated user gets full rwmda on /shared.
#
# Host path: /srv/store/mnt/_shared (auto-unlocked at boot by
# shared-store.service via /etc/luks/_shared.key). Inside this
# container the path appears as /w/_shared because docker-compose.yml
# binds /srv/store/mnt -> /w with rslave propagation, so
# /srv/store/mnt/_shared is visible at /w/_shared.
#
# `*` here is copyparty's "any authenticated user" sentinel — the IdP
# (Authelia, via NPM forward-auth) has already verified the request at
# this point, so granting `*` is bounded by the auth middleware, not
# anonymous. If shared-store.service hasn't unlocked the volume (e.g.
# recovery / partial bootstrap), /w/_shared is an empty directory on
# the host and copyparty serves an empty /shared — fail-closed.
[/shared]
  /w/_shared
  accs:
    rwmda: *
