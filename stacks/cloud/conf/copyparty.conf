# copyparty config for `cloud`.
#
# Loaded automatically by the copyparty/ac image because it sits in /cfg.
# Two accounts (sagan, marcus); strict per-user ACLs — neither admin can
# see the other's volume through this service. No anonymous access.
#
# Passwords are stored as argon2 hashes, expanded from environment
# variables at container start. Generate hashes with the procedure in
# ./README.md ("Generating password hashes"). Do NOT commit real hashes.
#
# Permission codes (copyparty native):
#   r  = read         w  = write (upload)
#   m  = move         d  = delete
#   a  = admin (manage volume settings, see all uploaders, etc.)
# So `rwmda` is full per-volume control for the owning user.


[global]
  # Hashed-password algorithm. Must match the algorithm used to generate
  # the values in $SAGAN_PW_HASH / $MARCUS_PW_HASH. See README.
  ah-alg: argon2

  # Bind only inside the container; no host port is published anyway.
  i: 0.0.0.0
  p: 3923

  # No anonymous browsing or uploads. Every request must carry creds.
  # (copyparty defaults to anonymous-readable when a volume grants `r: *`;
  # we never grant `*`, which keeps everything authenticated.)


[accounts]
  # Username: argon2 hash. The ${VAR} form is expanded by copyparty
  # from the process environment (set in docker-compose .env).
  sagan:  ${SAGAN_PW_HASH}
  marcus: ${MARCUS_PW_HASH}


# ---- volumes ----------------------------------------------------------
#
# Each block is:   [<url-path>]
#                    <filesystem-path-inside-container>
#                    accs:
#                      <perms>: <user>
#
# We deliberately DO NOT define a `[/]` root volume — without one,
# unauthenticated visitors get a login screen and nothing else.

[/sagan]
  /w/sagan
  accs:
    rwmda: sagan

[/marcus]
  /w/marcus
  accs:
    rwmda: marcus
