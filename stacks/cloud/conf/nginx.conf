# nginx.conf — sidecar in front of Nextcloud-fpm.
#
# Derived from the canonical Nextcloud nginx recipe:
#   https://docs.nextcloud.com/server/latest/admin_manual/installation/nginx.html
# with two deviations:
#   1. SSL is stripped — NPM terminates TLS upstream of us, we listen :80.
#   2. Upload-streaming knobs added so 50 GB+ PUT/POST body bytes flow
#      directly to fpm instead of spooling to nginx's local tmpfs first
#      (fastcgi_request_buffering off + the matching timeouts).
#
# fpm upstream is the `cloud` service on port 9000 (docker DNS).
# SCRIPT_FILENAME is built relative to /var/www/html *as fpm sees it*,
# not as we see it — fastcgi only carries the path string, fpm resolves
# it against its own filesystem.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Required for Nextcloud's WebDAV / chunked-upload paths and for
    # serving SVG / WOFF assets with the right Content-Type.
    types {
        text/javascript                       mjs;
        application/wasm                      wasm;
    }

    # Talk's signaling uses long-poll over plain HTTP in basic mode (no
    # HPB), so this map is technically unused today. Kept here so adding
    # the High Performance Backend later is a one-location change in
    # whichever proxy_pass block we add.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # 50 GB upload ceiling — must agree with php-fpm (zz-uploadlimits.ini),
    # NPM's advanced_config (npmAdvNextcloudTmpl in stacks/enrol/setup.go),
    # and Nextcloud's default_quota (occ config:system:set). All four
    # layers must agree or uploads fail at whichever is most restrictive.
    client_max_body_size 50G;
    client_body_timeout 3600s;
    client_header_timeout 3600s;
    send_timeout 3600s;

    # Disable nginx body buffering so the request body streams straight
    # to fpm. Otherwise nginx tries to buffer the whole 50 GB to its
    # local tmpfs (or proxy_temp_path) before forwarding — which both
    # fills the container fs and stalls the upload.
    fastcgi_request_buffering off;
    fastcgi_buffering off;
    fastcgi_read_timeout 3600s;
    fastcgi_send_timeout 3600s;
    fastcgi_connect_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    upstream php-handler {
        server cloud:9000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Nextcloud webroot, as fpm sees it. The sidecar doesn't need
        # the webroot mounted locally — every dynamic request is
        # fastcgi_passed to cloud:9000, and fpm resolves SCRIPT_FILENAME
        # against its own filesystem (where the image's webroot lives).
        # Static assets that Nextcloud serves through nginx-only paths
        # (CSS/JS) still resolve correctly because fpm hands them off.
        root /var/www/html;
        index index.php index.html /index.php$request_uri;

        # HSTS is set by NPM on the public side; no point setting it
        # here too (and getting it wrong by 6 months would be hard to
        # spot).
        add_header Referrer-Policy                   "no-referrer"       always;
        add_header X-Content-Type-Options            "nosniff"           always;
        add_header X-Frame-Options                   "SAMEORIGIN"        always;
        add_header X-Permitted-Cross-Domain-Policies "none"              always;
        add_header X-Robots-Tag                      "noindex, nofollow" always;
        add_header X-XSS-Protection                  "1; mode=block"     always;

        fastcgi_hide_header X-Powered-By;

        # WebDAV / CalDAV / CardDAV well-known endpoints — Nextcloud
        # serves them out of /remote.php/dav/.
        location = /.well-known/carddav  { return 301 /remote.php/dav/; }
        location = /.well-known/caldav   { return 301 /remote.php/dav/; }
        location = /.well-known/webfinger    { return 301 /index.php$request_uri; }
        location = /.well-known/nodeinfo     { return 301 /index.php$request_uri; }

        # Lockdown — these directories must NEVER be reachable over HTTP.
        # Even if a misconfigured share or a path-traversal attempt got
        # past Nextcloud's own checks, nginx hard-denies before fpm sees
        # the request. Standard Nextcloud security hardening.
        location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { deny all; }
        location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) { deny all; }

        # Main rewrite — everything that isn't a static file goes through
        # index.php with the original request URI preserved.
        location / {
            rewrite ^ /index.php;
        }

        # PHP files. The split-path-info regex extracts the script
        # filename + path-info exactly as the upstream Nextcloud nginx
        # config does it. SCRIPT_FILENAME uses $document_root (which fpm
        # interprets relative to its own /var/www/html, not ours).
        location ~ \.php(?:$|/) {
            # Reject suspicious encoded paths — copied verbatim from the
            # canonical Nextcloud nginx recipe.
            rewrite ^/(?!index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|oc[ms]-provider\/.+|.+\/richdocumentscode\/proxy) /index.php$request_uri;

            fastcgi_split_path_info ^(.+?\.php)(/.*)$;
            set $path_info $fastcgi_path_info;

            try_files $fastcgi_script_name =404;

            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO       $path_info;
            fastcgi_param HTTPS           on;
            fastcgi_param modHeadersAvailable true;
            fastcgi_param front_controller_active true;

            fastcgi_pass php-handler;
            fastcgi_intercept_errors on;
            fastcgi_request_buffering off;
            fastcgi_max_temp_file_size 0;
        }

        # Static assets — short-circuit fpm and serve from disk.
        # try_files falls back to /index.php for anything we don't have
        # locally (the sidecar root is the same path string fpm uses,
        # but the sidecar's filesystem is empty under /var/www/html
        # except for what's bind-mounted; the fallback handles that).
        location ~ \.(?:css|js|svg|gif|png|jpg|ico|wasm|tflite|map|html|otf|ttf|woff2?|bcmap|mp4|webm)$ {
            try_files $uri /index.php$request_uri;
            add_header Cache-Control "public, max-age=15778463, immutable";
            add_header Referrer-Policy                   "no-referrer"       always;
            add_header X-Content-Type-Options            "nosniff"           always;
            add_header X-Frame-Options                   "SAMEORIGIN"        always;
            add_header X-Permitted-Cross-Domain-Policies "none"              always;
            add_header X-Robots-Tag                      "noindex, nofollow" always;
            add_header X-XSS-Protection                  "1; mode=block"     always;
            access_log off;
        }
    }
}
