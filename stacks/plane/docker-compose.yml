# plane — project management (Vikunja under the hood; "plane" is camouflage).
#
# External hostname: plane.${DOMAIN} (camouflage name; see ADR-002).
# Image identity: vikunja/vikunja unified container — single Go binary serves
# both REST API and the Vue frontend on :3456. Postgres for persistence.
#
# Why Vikunja and not Plane: Plane (the project we previously deployed at
# v0.27.1) does not support generic OIDC — only hardcoded Google/GitHub/GitLab
# OAuth. Vikunja ships generic OIDC out of the box, which lets us complete
# the SSO chain through Authelia (ADR-003). External naming stays "plane"
# per camouflage.
#
# Backups (ADR-001): all state lives under /srv/store/plane-* on the host.
# Single rsync covers /srv/store/plane-files; Postgres dumped via pg_dump
# pre-backup hook to /srv/store/plane-db-backup/<ts>.sql and bundled into
# the rsync. See README.md "Backups".
#
# Auth (ADR-003): Authelia is the IdP. Vikunja owns its own session
# (OIDC client `plane`, callback /auth/openid/authelia). NPM proxies
# plane.${DOMAIN} → plane-app:3456 with a `bypass` Authelia rule —
# Vikunja handles login itself, NPM does not gate.

services:
  plane-app:
    image: vikunja/vikunja:2.3.0
    container_name: plane-app
    restart: unless-stopped
    networks:
      edge:
        aliases:
          # Camouflage: NPM proxy host targets `plane-app`. The alias `plane`
          # exists for symmetry with cloud's `cloud-web` naming and so any
          # future internal cross-stack call uses the camouflage name, not
          # vikunja-anything. ADR-002.
          - plane
    depends_on:
      plane-db:
        condition: service_healthy
    environment:
      # --- public-facing URL ---
      # Vikunja burns this into JS bundles + email links + OIDC redirect URIs.
      # Must be the exact external https URL, no trailing slash.
      VIKUNJA_SERVICE_PUBLICURL: "https://plane.${DOMAIN}"

      # --- service ---
      VIKUNJA_SERVICE_INTERFACE: "0.0.0.0:3456"
      # JWT signing key — rotating invalidates all sessions. 64-byte random.
      VIKUNJA_SERVICE_JWTSECRET: "${VIKUNJA_JWT_SECRET}"
      # 50 MB attachment cap inside Vikunja. Real upload chain (NPM →
      # Vikunja) is throttled by NPM's client_max_body_size in the proxy
      # host advanced_config — see stacks/enrol/setup.go npmAdvPlaneTmpl.
      VIKUNJA_FILES_MAXSIZE: "50MB"
      VIKUNJA_FILES_BASEPATH: "/app/vikunja/files"
      # No public registration — every account comes from OIDC (or operator
      # bootstrap). Stops the "anyone with the URL signs up" footgun.
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
      VIKUNJA_SERVICE_ENABLEEMAILREMINDERS: "false"
      VIKUNJA_SERVICE_ENABLETOTP: "false"   # Authelia handles 2FA upstream.

      # --- database ---
      VIKUNJA_DATABASE_TYPE: "postgres"
      VIKUNJA_DATABASE_HOST: "plane-db:5432"
      VIKUNJA_DATABASE_DATABASE: "vikunja"
      VIKUNJA_DATABASE_USER: "vikunja"
      VIKUNJA_DATABASE_PASSWORD: "${POSTGRES_PASSWORD}"
      VIKUNJA_DATABASE_SSLMODE: "disable"

      # --- OIDC: Authelia ---
      # Provider key in URL is `authelia` (lowercase). Authelia's redirect_uri
      # in stacks/authelia/configuration.yml.template MUST match exactly:
      # https://plane.${DOMAIN}/auth/openid/authelia
      VIKUNJA_AUTH_LOCAL_ENABLED: "false"     # OIDC-only — no email/password.
      VIKUNJA_AUTH_OPENID_ENABLED: "true"
      VIKUNJA_AUTH_OPENID_REDIRECTURL: "https://plane.${DOMAIN}/auth/openid/"
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_NAME: "Single Sign-On"
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_AUTHURL: "https://auth.${DOMAIN}"
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_LOGOUTURL: "https://auth.${DOMAIN}/logout"
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTID: "plane"
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_CLIENTSECRET: "${VIKUNJA_OIDC_CLIENT_SECRET}"
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_SCOPE: "openid profile email"
      # Email-based linking: if a Vikunja-local account exists (operator
      # bootstrapped, etc.) and the OIDC user's email matches, link them
      # instead of refusing. Safe here because every user-facing account
      # ALWAYS comes from Authelia (LOCAL_ENABLED=false above), so the only
      # local account is whatever the operator may import via CLI later.
      VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHELIA_EMAILFALLBACK: "true"

      # --- mailer (disabled — no notifications without an external SMTP) ---
      VIKUNJA_MAILER_ENABLED: "false"

      # --- frontend bundle settings ---
      VIKUNJA_FRONTEND_URL: "https://plane.${DOMAIN}"

      # --- timezone (server-side timestamps; per-user TZ overrides this) ---
      VIKUNJA_SERVICE_TIMEZONE: "UTC"

    volumes:
      # The single user-data bind. Vikunja stores attachments + avatars +
      # task imports here. Owned by uid 1000 (Vikunja's in-image user).
      # ADR-001: under /srv/store/plane-*, single rsync target.
      - /srv/store/plane-files:/app/vikunja/files:rw

    healthcheck:
      # Vikunja's image is distroless — no shell, no wget. Use the binary's
      # own `vikunja healthcheck` subcommand which exits 0 on a working API.
      # Side effect: it runs DB migrations on every probe, which is a no-op
      # on a healthy stack but adds ~50 ms; tolerable at 30 s interval.
      test: ["CMD", "/app/vikunja/vikunja", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    mem_limit: 512m

  plane-db:
    # Pinned to 16.x to match cloud-db's major version — keeps the host's
    # pg_dump tooling consistent across stacks. See ADR-006 image-pin policy.
    image: postgres:16.6-alpine
    container_name: plane-db
    restart: unless-stopped
    networks:
      - edge
    environment:
      POSTGRES_DB: "vikunja"
      POSTGRES_USER: "vikunja"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      # Disable the Postgres "trust" auth that postgres:alpine uses for
      # local socket connections — force scram-sha-256 even from inside
      # the container. Defense in depth; the pg_hba in this image already
      # restricts non-local connections to scram-sha-256.
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      PGDATA: "/var/lib/postgresql/data/pgdata"

    volumes:
      # ADR-001: separate bind so pg_dump can target a known path; the
      # raw data dir is included in the rsync as a safety net but
      # pg_dump is the authoritative backup.
      - /srv/store/plane-db:/var/lib/postgresql/data:rw

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vikunja", "-d", "vikunja"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    mem_limit: 256m

networks:
  edge:
    external: true
