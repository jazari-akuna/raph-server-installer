# authelia-location.conf — internal /authelia location for forward-auth.
#
# This snippet is included once per protected proxy host. It exposes an
# internal-only location that NPM's `auth_request` directive (in
# authelia-authrequest.conf) calls out to. The location proxies to
# Authelia's /api/verify endpoint, which decides whether the request
# carries a valid SSO session.
#
# Mount this file at /snippets/authelia-location.conf inside the NPM
# container (see ../docker-compose.yml of stacks/ingress for the bind).

set $upstream_authelia http://authelia:9091/api/verify;

location /authelia {
    internal;
    proxy_pass_request_body off;
    proxy_pass $upstream_authelia;
    proxy_set_header Content-Length "";

    # Pass the original request URI to Authelia so it can decide based
    # on the host + path being requested.
    proxy_set_header X-Original-Method   $request_method;
    proxy_set_header X-Original-URL      $scheme://$http_host$request_uri;
    proxy_set_header X-Forwarded-Method  $request_method;
    proxy_set_header X-Forwarded-Proto   $scheme;
    proxy_set_header X-Forwarded-Host    $http_host;
    proxy_set_header X-Forwarded-URI     $request_uri;
    proxy_set_header X-Forwarded-For     $remote_addr;
    proxy_set_header Host                $http_host;
    proxy_set_header Connection          "";

    proxy_redirect  http://  $scheme://;
    proxy_http_version 1.1;
    proxy_cache_bypass $cookie_session;
    proxy_no_cache     $cookie_session;
    proxy_buffers      4 32k;
    client_body_buffer_size 128k;

    send_timeout    5m;
    proxy_read_timeout    240;
    proxy_send_timeout    240;
    proxy_connect_timeout 240;
}
