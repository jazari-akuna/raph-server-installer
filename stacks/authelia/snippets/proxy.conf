# proxy.conf — common proxy_pass plumbing.
#
# Include before authelia-authrequest.conf in each protected location.
# Sets the headers most upstream services expect (X-Forwarded-*) plus
# the buffering / timeout knobs that play nicely with auth_request.

client_body_buffer_size 128k;
send_timeout 5m;
proxy_read_timeout 360;
proxy_send_timeout 360;
proxy_connect_timeout 360;

proxy_http_version 1.1;
proxy_set_header Host $http_host;
proxy_set_header X-Original-URL  $scheme://$http_host$request_uri;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $http_host;
proxy_set_header X-Forwarded-URI   $request_uri;
proxy_set_header X-Forwarded-For   $remote_addr;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;
proxy_redirect    http://  $scheme://;

proxy_cache_bypass $cookie_session;
proxy_no_cache     $cookie_session;
proxy_buffers      64 256k;
