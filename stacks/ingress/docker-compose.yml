# ingress — Nginx Proxy Manager (NPM)
#
# Public on :80/:443. Admin UI bound to 127.0.0.1:81 only — reachable
# via the `mesh` overlay or via SSH tunnel, never from the public internet.
# DNS-01 wildcard cert is requested through the admin UI using an OVH
# application token scoped to the single zone. See ./README.md for the runbook.

services:
  ingress:
    # jc21/nginx-proxy-manager — current stable: 2.14.0 (verified 2026-04-25 against Docker Hub)
    # Pin a specific tag, not `latest`, so deploys are reproducible.
    image: jc21/nginx-proxy-manager:2.14.0
    container_name: ingress
    restart: unless-stopped
    ports:
      # Public HTTP/HTTPS ingress.
      - "80:80"
      - "443:443"
      # Admin UI: loopback-only. Reach it via SSH tunnel or the mesh overlay.
      - "127.0.0.1:81:81"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      # Forward-auth snippets shared with authelia. Mounted read-only;
      # included from per-proxy-host Advanced config (see
      # ../authelia/snippets/ and ../authelia/DESIGN.md).
      - ../authelia/snippets:/snippets:ro
    networks:
      - edge
    # Resolve `host.docker.internal` to the host's bridge gateway so NPM
    # can proxy to host-networked services (e.g. enrol on 127.0.0.1:8080
    # of the host — see stacks/enrol/docker-compose.yml plan B).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g

  # certbot — wildcard cert issuer (Parcel 4A).
  #
  # Profile-gated so `docker compose up -d` does NOT start it; only the
  # wizard's finalize handler (or an operator running `docker compose
  # --profile finalize run --rm certbot ...`) brings it up. After the
  # cert is issued the container exits and is removed by --rm.
  #
  # The credentials file lives on a tmpfs at /tmp/certbot-creds. The
  # wizard writes the operator's DNS API token there (mode 0600) just
  # before invoking certbot and defers a delete; the file never lands on
  # persistent storage. /etc/letsencrypt is shared with the ingress
  # container so the issued cert is immediately usable by NPM.
  certbot:
    build:
      context: ./certbot
    profiles:
      - finalize
    container_name: certbot
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      # Pass the wizard-written creds file in by bind from the host
      # tmpfs path. The wizard writes /run/raph-certbot/<provider>.ini
      # (host /run is tmpfs by default on Ubuntu 24.04) at mode 0600 and
      # deletes it immediately after certbot exits.
      - /run/raph-certbot:/tmp/certbot-creds:ro
    tmpfs:
      # In-container scratch for certbot's own state. Certbot writes
      # account JSON, lockfiles, etc., to /var/lib/letsencrypt during a
      # run; we want that scoped to the container's lifetime, not the
      # bind-mounted /etc/letsencrypt.
      - /var/lib/letsencrypt
    networks:
      - edge

networks:
  edge:
    external: true
